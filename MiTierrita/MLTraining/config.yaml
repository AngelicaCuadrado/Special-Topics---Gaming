behaviors:
  CaterpillarAgent:
    trainer_type: ppo
    max_steps: 1_000_000
    time_horizon: 64
    summary_freq: 50000

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0

    hyperparameters:
      batch_size: 1024
      buffer_size: 40960
      learning_rate: 3.0e-4
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3